services:
  db:
    container_name: peeng_db
    image: postgres:14.20
    restart: always
    volumes:
      - peeng_volume:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: peeng_db
    ports:
      - 5432:5432

volumes:
  peeng_volume:
