spring:
  application:
    name: peeng
  config:
    import: file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/peeng_db
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: localhost
    port: 5672

  mail:
    host: ${SMTP_HOST}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    port: 2525
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  security:
    jwt: ${JWT_SECRET}
  email: ${MAIL_USER_DEV}
