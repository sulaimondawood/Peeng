server:
  servlet:
    context-path: /api/v1

spring:
  application:
    name: peeng
  config:
    import: file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/peeng_db
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: password
    listener:
      simple:
        retry:
          enabled: true
          max-retries: 3
          initial-interval: 2000ms # Wait 2 seconds before retry 1
          multiplier: 2 #

  mail:
    host: ${SMTP_HOST}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    port: 2525
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  security:
    jwt: ${JWT_SECRET}
  email: ${MAIL_USER_DEV}
  client-url: ${CLIENT_URL}

